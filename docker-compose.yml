services:
  postgres:
    image: postgres:16-alpine
    container_name: podepedir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: podepedir
      POSTGRES_PASSWORD: Conquistas@07
      POSTGRES_DB: podepedir
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podepedir -d podepedir"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: podepedir-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://podepedir:Conquistas%4007@postgres:5432/podepedir?schema=public
      PORT: 3333
      PUBLIC_BACKEND_URL: http://backend:3333
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: dev-waha-key
      WAHA_WEBHOOK_SECRET: dev-waha-webhook-secret
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      waha:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && node dist/src/server.js"

  waha:
    image: devlikeapro/waha:latest
    container_name: podepedir-waha
    restart: unless-stopped
    environment:
      WAHA_API_KEY: dev-waha-key
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: admin
      WHATSAPP_DEFAULT_ENGINE: WEBJS
    ports:
      - "3000:3000"
    volumes:
      - waha_sessions:/app/.sessions

volumes:
  postgres_data:
  waha_sessions:
